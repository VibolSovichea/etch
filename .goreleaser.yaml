version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/etch
    binary: etch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/vibolsovichea/etch/internal/version.Version={{.Version}}
      - -X github.com/vibolsovichea/etch/internal/version.Commit={{.ShortCommit}}
      - -X github.com/vibolsovichea/etch/internal/version.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "etch_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: vibolsovichea
      name: homebrew-etch
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/vibolsovichea/etch"
    description: "A terminal note-taking app inspired by Khmer wall carvings"
    license: "MIT"
    install: |
      bin.install "etch"
    test: |
      system "#{bin}/etch", "--version"

release:
  github:
    owner: vibolsovichea
    name: etch
